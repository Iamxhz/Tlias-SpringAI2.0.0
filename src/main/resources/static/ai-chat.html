<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能助手 - Tlias</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'chat-bg': '#f7f7f8',
                        'bubble-user': '#2563eb',
                        'bubble-ai': '#ffffff',
                    }
                }
            }
        }
    </script>

    <!-- Font Awesome 图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ===== 滚动条美化 ===== */
        .chat-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .chat-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-scroll::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 3px;
        }
        .chat-scroll::-webkit-scrollbar-thumb:hover {
            background: #9ca3af;
        }

        /* ===== 打字机光标动画 ===== */
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        .typing-cursor::after {
            content: '▍';
            animation: blink 1s ease-in-out infinite;
            color: #374151;
        }

        /* ===== 消息入场动画 ===== */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .message-enter {
            animation: slideUp 0.3s ease-out;
        }

        /* ===== 思考中三个点跳动 ===== */
        @keyframes bounce-dot {
            0%, 80%, 100% { transform: scale(0.4); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }
        .thinking-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #9ca3af;
            animation: bounce-dot 1.4s ease-in-out infinite;
        }
        .thinking-dot:nth-child(1) { animation-delay: 0s; }
        .thinking-dot:nth-child(2) { animation-delay: 0.2s; }
        .thinking-dot:nth-child(3) { animation-delay: 0.4s; }

        /* ===== 输入框焦点光晕 ===== */
        .input-glow:focus {
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        /* ===== HTML 内容样式 ===== */
        .ai-message-content pre {
            background: #1e293b;
            color: #e2e8f0;
            border-radius: 8px;
            padding: 12px 16px;
            overflow-x: auto;
            font-size: 0.875rem;
            line-height: 1.6;
        }
        .ai-message-content code {
            background: #f1f5f9;
            color: #e11d48;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.875em;
        }
        .ai-message-content pre code {
            background: transparent;
            color: inherit;
            padding: 0;
        }
        .ai-message-content p {
            margin-bottom: 0.5em;
        }
        .ai-message-content p:last-child {
            margin-bottom: 0;
        }
    </style>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">

    <!-- ==================== 主容器 ==================== -->
    <div class="w-full max-w-3xl h-[92vh] bg-white rounded-2xl shadow-2xl flex flex-col overflow-hidden">

        <!-- ========== 顶部标题栏 ========== -->
        <header class="flex items-center justify-between px-6 py-4 bg-white border-b border-gray-100 shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-lg shadow-blue-200">
                    <i class="fa-solid fa-robot text-white text-lg"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-gray-800 leading-tight">AI 智能助手</h1>
                    <p class="text-xs text-gray-400">Spring AI · 流式对话</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <span id="statusIndicator" class="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-green-50 text-green-600 text-xs font-medium">
                    <span class="w-2 h-2 rounded-full bg-green-500"></span>
                    在线
                </span>
            </div>
        </header>

        <!-- ========== 聊天消息区 ========== -->
        <main id="chatContainer" class="flex-1 overflow-y-auto chat-scroll px-4 py-6 space-y-6 bg-gray-50">

            <!-- 欢迎消息将由 JS 动态插入 -->

        </main>

        <!-- ========== 底部输入栏 ========== -->
        <footer class="shrink-0 bg-white border-t border-gray-100 px-4 py-4">
            <div class="max-w-2xl mx-auto space-y-2">
                <!-- 消息输入行 -->
                <div class="flex items-end gap-3">
                <!-- 输入框 -->
                <div class="flex-1 relative">
                    <textarea
                        id="messageInput"
                        rows="1"
                        placeholder="输入消息，Enter 发送，Shift+Enter 换行..."
                        class="w-full resize-none rounded-2xl border border-gray-200 bg-gray-50 px-4 py-3 pr-12 text-sm text-gray-800 placeholder-gray-400 outline-none transition-all input-glow"
                        style="max-height: 150px;"
                    ></textarea>
                    <!-- 清空按钮 (输入时显示) -->
                    <button
                        id="clearBtn"
                        class="hidden absolute right-3 top-1/2 -translate-y-1/2 w-6 h-6 rounded-full bg-gray-300 text-white flex items-center justify-center hover:bg-gray-400 transition text-xs"
                        title="清空"
                    >
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>

                <!-- 发送按钮 -->
                <button
                    id="sendBtn"
                    class="shrink-0 w-11 h-11 rounded-2xl bg-blue-600 text-white flex items-center justify-center hover:bg-blue-700 active:scale-95 transition-all shadow-lg shadow-blue-200 disabled:opacity-50 disabled:cursor-not-allowed disabled:active:scale-100"
                >
                    <i id="sendIcon" class="fa-solid fa-paper-plane"></i>
                    <i id="loadingIcon" class="fa-solid fa-circle-notch fa-spin hidden"></i>
                </button>
            </div>
                </div>
            </div>
            <p class="text-center text-xs text-gray-400 mt-2">
                接口 POST /ai/chat · 响应 Streaming · @Tool 自动提取业务参数
            </p>
        </footer>
    </div>

    <!-- ==================== 核心脚本 ==================== -->
    <script>
        (function() {
            // ========== DOM 引用 ==========
            const chatContainer = document.getElementById('chatContainer');
            const messageInput = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            const sendIcon = document.getElementById('sendIcon');
            const loadingIcon = document.getElementById('loadingIcon');
            const clearBtn = document.getElementById('clearBtn');
            const statusIndicator = document.getElementById('statusIndicator');

            // ========== 状态管理 ==========
            let isStreaming = false;
            let currentAiBubble = null; // 当前正在流式写入的 AI 气泡

            // ========== 工具函数 ==========
            function scrollToBottom(smooth = true) {
                if (smooth) {
                    chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
                } else {
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }
            }

            function formatTime() {
                const now = new Date();
                return now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            }

            function escapeHtml(text) {
                const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
                return text.replace(/[&<>"']/g, c => map[c]);
            }

            // 简易 Markdown → HTML（处理代码块、行内代码、粗体、换行）
            function simpleMarkdownToHtml(text) {
                let html = escapeHtml(text);
                // 代码块 ```
                html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
                    return `<pre><code>${code.trim()}</code></pre>`;
                });
                // 行内代码 ``
                html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
                // 粗体 **
                html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                // 换行
                html = html.replace(/\n/g, '<br>');
                return html;
            }

            // ========== 创建消息气泡 ==========
            function createBubble(role, content = '') {
                const wrapper = document.createElement('div');
                wrapper.className = `flex gap-3 message-enter ${role === 'user' ? 'flex-row-reverse' : ''}`;

                // 头像
                const avatar = document.createElement('div');
                avatar.className = `w-9 h-9 rounded-xl shrink-0 flex items-center justify-center text-sm shadow-md ${
                    role === 'user'
                        ? 'bg-gradient-to-br from-blue-500 to-indigo-600 text-white'
                        : 'bg-gradient-to-br from-emerald-400 to-teal-500 text-white'
                }`;
                avatar.innerHTML = role === 'user'
                    ? '<i class="fa-solid fa-user"></i>'
                    : '<i class="fa-solid fa-robot"></i>';

                // 气泡体
                const body = document.createElement('div');
                body.className = `flex flex-col max-w-[75%] ${role === 'user' ? 'items-end' : 'items-start'}`;

                // 气泡内容
                const bubble = document.createElement('div');
                bubble.className = `px-4 py-3 rounded-2xl text-sm leading-relaxed whitespace-pre-wrap break-words ${
                    role === 'user'
                        ? 'bg-blue-600 text-white rounded-br-md'
                        : 'bg-white border border-gray-200 text-gray-800 rounded-bl-md shadow-sm ai-message-content'
                }`;
                bubble.innerHTML = content;

                // 时间
                const time = document.createElement('span');
                time.className = 'text-xs text-gray-400 mt-1 px-1';
                time.textContent = formatTime();

                // 组装
                body.appendChild(bubble);
                body.appendChild(time);
                wrapper.appendChild(avatar);
                wrapper.appendChild(body);

                return { wrapper, bubble, time };
            }

            // ========== 添加用户消息 ==========
            function addUserMessage(text) {
                const { wrapper } = createBubble('user', escapeHtml(text));
                chatContainer.appendChild(wrapper);
                scrollToBottom();
            }

            // ========== 添加 AI 欢迎消息 (静态) ==========
            function addWelcomeMessage() {
                const { wrapper, bubble } = createBubble('assistant');
                bubble.innerHTML = simpleMarkdownToHtml(
                    '你好！我是你的 **智能助手**，本地前端界面已就绪。\n\n请确保后端 Spring AI 接口 `/ai/chat` 已正确启动，然后就可以开始对话了 🎉'
                );
                chatContainer.appendChild(wrapper);
                scrollToBottom(false);
            }

            // ========== 创建 AI 气泡（流式写入目标） ==========
            function createAiStreamBubble() {
                const { wrapper, bubble } = createBubble('assistant', '');
                bubble.classList.add('typing-cursor'); // 打字光标
                chatContainer.appendChild(wrapper);
                scrollToBottom();
                return { wrapper, bubble };
            }

            // 移除打字光标
            function finishAiBubble(bubble) {
                bubble.classList.remove('typing-cursor');
            }

            // ========== Loading / 状态切换 ==========
            function setLoading(isLoading) {
                isStreaming = isLoading;
                if (isLoading) {
                    sendBtn.disabled = true;
                    sendIcon.classList.add('hidden');
                    loadingIcon.classList.remove('hidden');
                    messageInput.disabled = true;
                    statusIndicator.innerHTML = `
                        <span class="flex items-center gap-1.5 text-yellow-600 bg-yellow-50 px-3 py-1.5 rounded-full text-xs font-medium">
                            <span class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></span>
                            响应中...
                        </span>
                    `;
                } else {
                    sendBtn.disabled = false;
                    sendIcon.classList.remove('hidden');
                    loadingIcon.classList.add('hidden');
                    messageInput.disabled = false;
                    messageInput.focus();
                    statusIndicator.innerHTML = `
                        <span class="flex items-center gap-1.5 text-green-600 bg-green-50 px-3 py-1.5 rounded-full text-xs font-medium">
                            <span class="w-2 h-2 rounded-full bg-green-500"></span>
                            在线
                        </span>
                    `;
                }
            }

            // 显示 AI 正在思考的三个点
            function showThinkingDots(bubbleElement) {
                bubbleElement.innerHTML =
                    '<span class="thinking-dot"></span>' +
                    '<span class="thinking-dot"></span>' +
                    '<span class="thinking-dot"></span>';
            }

            // ========== 构建请求载荷（业务上下文由 @Tool 自动提取） ==========
            function buildPayload(text) {
                return { message: text };
            }

            // ========== 核心：流式请求 ==========
            async function sendMessage() {
                const text = messageInput.value.trim();
                if (!text || isStreaming) return;

                // 1. 添加用户消息
                addUserMessage(text);

                // 2. 清空输入框
                messageInput.value = '';
                autoResizeTextarea();
                clearBtn.classList.add('hidden');

                // 3. 创建 AI 气泡 & 显示思考动画
                const { bubble } = createAiStreamBubble();
                showThinkingDots(bubble);
                currentAiBubble = bubble;
                scrollToBottom();

                // 4. 进入 loading 状态
                setLoading(true);

                // 5. 用于累积 Markdown 内容
                let accumulatedText = '';

                try {
                    const response = await fetch('/ai/chat', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(buildPayload(text)),
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }

                    // 获取 ReadableStream
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder('utf-8');

                    // 初次收到数据时清除思考动画
                    let firstChunk = true;
                    // SSE 行缓冲区：处理跨 chunk 被截断的行
                    let lineBuffer = '';

                    while (true) {
                        const { value, done } = await reader.read();
                        if (done) break;

                        // 1. 解码当前 chunk
                        const text = decoder.decode(value, { stream: true });

                        // 2. 将缓冲区残余 + 新文本拼接，按 \n 拆行
                        const lines = (lineBuffer + text).split('\n');
                        // 最后一行可能不完整（被 chunk 边界截断），留到下次拼接
                        lineBuffer = lines.pop();

                        // 3. 逐行解析 SSE 报文
                        for (const line of lines) {
                            // 只处理以 "data:" 开头的行
                            if (!line.startsWith('data:')) continue;

                            // 截取 "data:" 之后的实际内容，并去除首尾空白
                            let content = line.slice(5).trim();

                            // 4. 过滤干扰项
                            if (content === '') continue;           // 空数据行
                            if (content === '[DONE]') continue;     // OpenAI 规范结束符
                            if (content === '"[DONE]"') continue;   // 防止后端多套一层引号

                            // ==========================================
                            // 5. 核心修复：处理 Spring 框架附带的 JSON 双引号和转义符
                            // ==========================================
                            // 如果内容被双引号包裹，尝试用 JSON.parse 把它还原成真正的文本
                            if (content.startsWith('"') && content.endsWith('"')) {
                                try {
                                    // 这一步非常神奇，JSON.parse("\"你好\\n世界\"") 会自动去掉外层引号，并把 \\n 变成真正的换行
                                    content = JSON.parse(content);
                                } catch (e) {
                                    // 如果解析失败，就采用粗暴的截取法
                                    content = content.substring(1, content.length - 1);
                                }
                            }

                            // 6. 累积纯文本
                            if (firstChunk) {
                                firstChunk = false;
                                // 清除思考点的同时写入首个字符
                                accumulatedText = content;
                            } else {
                                accumulatedText += content;
                            }
                        }

                        // 6. 渲染到 DOM（打字机效果）
                        if (!firstChunk) {
                            bubble.innerHTML = simpleMarkdownToHtml(accumulatedText);
                            bubble.classList.add('typing-cursor');
                            scrollToBottom();
                        }
                    }

                    // 流结束：移除光标，显示最终内容
                    finishAiBubble(bubble);
                    bubble.innerHTML = simpleMarkdownToHtml(accumulatedText);

                } catch (error) {
                    console.error('流式请求失败:', error);
                    bubble.classList.remove('typing-cursor');
                    bubble.innerHTML = `
                        <div class="text-red-500">
                            <i class="fa-solid fa-triangle-exclamation mr-1"></i>
                            <strong>请求失败：</strong>${escapeHtml(error.message)}
                        </div>
                        <div class="text-xs text-gray-400 mt-1">
                            请确认后端 <code>/ai/chat</code> 接口已启动并支持流式响应 (text/event-stream)
                        </div>
                    `;
                } finally {
                    setLoading(false);
                    currentAiBubble = null;
                }
            }

            // ========== 自动调整输入框高度 ==========
            function autoResizeTextarea() {
                messageInput.style.height = 'auto';
                messageInput.style.height = Math.min(messageInput.scrollHeight, 150) + 'px';
            }

            function clearInput() {
                messageInput.value = '';
                autoResizeTextarea();
                clearBtn.classList.add('hidden');
                messageInput.focus();
            }

            // ========== 事件监听 ==========
            messageInput.addEventListener('input', () => {
                autoResizeTextarea();
                // 显示/隐藏清空按钮
                if (messageInput.value.length > 0) {
                    clearBtn.classList.remove('hidden');
                } else {
                    clearBtn.classList.add('hidden');
                }
            });

            messageInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            // 发送 & 清空按钮监听（替代 HTML 行内 onclick，避免闭包作用域问题）
            sendBtn.addEventListener('click', sendMessage);
            clearBtn.addEventListener('click', clearInput);

            // ========== 初始化 ==========
            function init() {
                addWelcomeMessage();
                messageInput.focus();
            }

            init();
        })();
    </script>

</body>
</html>
